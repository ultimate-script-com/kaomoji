<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>SVG App</title>
    </head>

    <body style="margin: 0; overflow: hidden">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="100vw"
            height="100vh"
        ></svg>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const svg = document.querySelector("svg");

                // =========================
                // サイズ & 座標系
                // =========================
                let S = Math.min(window.innerWidth, window.innerHeight);

                svg.setAttribute("viewBox", `0 0 ${S} ${S}`);
                svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

                svg.style.display = "block";

                // =========================
                // 背景
                // =========================
                const bgColor = "#0f172a";

                const bg = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "rect",
                );
                bg.setAttribute("width", S);
                bg.setAttribute("height", S);
                bg.setAttribute("fill", bgColor);
                svg.appendChild(bg);

                // =========================
                // 顔文字
                // =========================
                const faces = ["(´・ω・｀)", "(ﾟ∀ﾟ)", "(；ﾟДﾟ)"];
                const objects = [];

                function generatePositions() {
                    return [
                        [S * 0.3, S * 0.25],
                        [S * 0.7, S * 0.4],
                        [S * 0.5, S * 0.7],
                    ];
                }

                function createObjects() {
                    const pos = generatePositions();

                    for (let i = 0; i < faces.length; i++) {
                        const text = document.createElementNS(
                            "http://www.w3.org/2000/svg",
                            "text",
                        );

                        const face = faces[i];
                        text.textContent = face;

                        const size = S * 0.07;

                        text.setAttribute("font-size", size);
                        text.setAttribute("font-family", "monospace");
                        text.setAttribute("text-anchor", "middle");

                        const color =
                            face === "(´・ω・｀)"
                                ? "#7dd3ff"
                                : face === "(ﾟ∀ﾟ)"
                                  ? "#ffd166"
                                  : "#ff6b6b";

                        text.setAttribute("fill", color);

                        svg.appendChild(text);

                        objects.push({
                            el: text,
                            face,
                            x: pos[i][0],
                            y: pos[i][1],
                            phase: Math.random() * Math.PI * 2,
                            gPhase: Math.random() * Math.PI * 2,
                            glitch: 0,
                        });
                    }
                }

                // =========================
                // グリッチ制御（統一）
                // =========================
                let glitchTimer = 0;

                function triggerGlitch() {
                    const obj = objects[(Math.random() * objects.length) | 0];
                    if (obj) obj.glitch = 0.3;
                }

                // =========================
                // アニメーション
                // =========================
                let t = 0;

                function animate() {
                    t += 0.012;
                    glitchTimer++;

                    // 1.5秒ごと
                    if (glitchTimer > 90) {
                        triggerGlitch();
                        glitchTimer = 0;
                    }

                    for (const obj of objects) {
                        let x = obj.x;
                        let y = obj.y;

                        // 微揺れ
                        x += Math.sin(t * 10 + obj.gPhase) * 0.2;
                        y += Math.cos(t * 12 + obj.gPhase) * 0.2;

                        // 顔ごとの動き
                        if (obj.face === "(´・ω・｀)") {
                            x += Math.sin(t * 1.2 + obj.phase) * (S * 0.05);
                            y += Math.cos(t * 1.0 + obj.phase) * (S * 0.04);
                        } else if (obj.face === "(ﾟ∀ﾟ)") {
                            x += Math.sin(t * 3.5 + obj.phase) * (S * 0.1);
                            y += Math.sin(t * 5 + obj.phase) * (S * 0.08);
                        } else {
                            x += Math.sin(t * 2.5 + obj.phase) * (S * 0.05);
                            y += Math.cos(t * 3.5 + obj.phase) * (S * 0.04);
                            x += (Math.random() - 0.5) * 5;
                            y += (Math.random() - 0.5) * 5;
                        }

                        // グリッチ
                        if (obj.glitch > 0) {
                            const g = obj.glitch;

                            x += (Math.random() - 0.5) * 4 * g;
                            y += (Math.random() - 0.5) * 4 * g;

                            obj.glitch *= 0.9;
                            if (obj.glitch < 0.01) obj.glitch = 0;
                        }

                        obj.el.setAttribute(
                            "transform",
                            `translate(${x},${y})`,
                        );
                    }

                    requestAnimationFrame(animate);
                }

                // =========================
                // start
                // =========================
                createObjects();
                animate();
            });
        </script>
    </body>
</html>
